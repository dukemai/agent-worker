name = "email-worker"
main = "apps/worker/src/index.ts"
compatibility_date = "2024-08-01"

# Email Worker binding - required for sending emails from the worker
# (e.g., replies, forwarding). For local dev, wrangler simulates this.
[[send_email]]
name = "EMAIL"

# Cron triggers
# 05:30 UTC = 06:30 Stockholm (winter/CET); adjust to 04:30 UTC in summer (CEST)
# Daily: growing ingest + daily digest
# Sun/Wed: growing suggestions (generates growing_suggestions_log for the week)
[triggers]
crons = ["30 5 * * *", "30 5 * * Sun,Wed"]
